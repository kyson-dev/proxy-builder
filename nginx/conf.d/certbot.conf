# Certbot HTTP-01 Challenge Configuration
# 此配置用于 Let's Encrypt 证书申请和自动续期

server {
    listen 80;
    server_name kyson.site;

    # Certbot webroot 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他请求返回简单页面
    location / {
        root /var/www/html;
        index index.html;
    }
}
