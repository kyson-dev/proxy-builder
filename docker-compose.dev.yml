services:
  s-ui:
    image: alireza7/s-ui:latest
    container_name: s-ui
    hostname: s-ui
    restart: unless-stopped
    tty: true
    ports:
      - "443:443/tcp"
      - "443:443/udp"
      - "2095:2095/tcp"  # Web panel
      - "2096:2096/tcp"  # Subscription service
    volumes:
      # S-UI 数据目录：必须设置 S_UI_DATA_DIR 环境变量
      - ${S_UI_DATA_DIR}/db:/app/db
      - ${S_UI_DATA_DIR}/cert:/app/cert
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
