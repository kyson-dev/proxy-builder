services:
  # Sing-box - 代理服务（VLESS Reality + Hysteria2 with self-signed cert）
  # docker logs -f sing-box 持续日志输出
  sing-box:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: sing-box
    restart: unless-stopped
    network_mode: host
    entrypoint: /entrypoint.sh
    volumes:
      - ./sing-box/entrypoint.sh:/entrypoint.sh:ro
      - ./sing-box/config.json.template:/etc/sing-box/config.json.template:ro
      - ./sing-box/certs:/etc/sing-box/certs:ro
    environment:
      - VLESS_USERS=${VLESS_USERS}
      - H2_USERS=${H2_USERS}
      - REALITY_PRIVATE_KEY=${REALITY_PRIVATE_KEY}
      - REALITY_SHORT_ID=${REALITY_SHORT_ID}
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
