services:
  s-ui:
    image: alireza7/s-ui:latest
    container_name: s-ui
    hostname: s-ui
    restart: unless-stopped
    tty: true
    ports:
      # 443 端口用于代理流量（VLESS, Hysteria2 等）
      - "443:443/tcp"
      - "443:443/udp"
      # 注意: 2095 和 2096 不暴露到主机，仅通过 Caddy 反向代理访问
    volumes:
      # S-UI 数据目录：必须设置 S_UI_DATA_DIR 环境变量
      - ${S_UI_DATA_DIR}/db:/app/db
      - ${S_UI_DATA_DIR}/cert:/app/cert
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
  caddy:
    image: caddy:latest
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    tty: true
    ports:
      # HTTP 端口（用于自动 HTTPS 重定向）
      - "80:80/tcp"
      # Web 面板端口（反向代理到 s-ui:2095）
      - "2095:2095/tcp"
      # 订阅服务端口（反向代理到 s-ui:2096）
      - "2096:2096/tcp"
      # 注意: Caddy 不监听 443，避免与 S-UI 的代理流量冲突
    environment:
      - PANEL_DOMAIN=${PANEL_DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${CADDY_DATA_DIR}/data:/data
      - ${CADDY_DATA_DIR}/config:/config
    depends_on:
      - s-ui
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
