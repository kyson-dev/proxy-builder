services:
  s-ui:
    image: alireza7/s-ui:latest
    container_name: s-ui
    hostname: s-ui
    restart: unless-stopped
    tty: true
    ports:
      - "443:443/tcp"
      - "443:443/udp"
      - "2095:2095/tcp"
      - "2096:2096/tcp"
    volumes:
      # S-UI 数据目录：生产环境使用 ~/data/s-ui，本地开发使用 ./s-ui
      - ${S_UI_DATA_DIR:-./s-ui}/db:/app/db
      - ${S_UI_DATA_DIR:-./s-ui}/cert:/app/cert
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
