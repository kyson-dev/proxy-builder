services:
  # Nginx - 仅用于 Certbot HTTP-01 验证
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    entrypoint: /entrypoint.sh
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./webroot:/var/www/html
    networks:
      - proxy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot - 自动续期证书
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./webroot:/var/www/html
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/html; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    networks:
      - proxy-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Sing-box - 代理服务（VLESS Reality + Hysteria2 + TUIC）
  # docker logs -f sing-box 持续日志输出
  sing-box:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: sing-box
    restart: unless-stopped
    network_mode: host
    # 使用脚本生成配置并启动
    entrypoint: /entrypoint.sh
    volumes:
      - ./sing-box/entrypoint.sh:/entrypoint.sh:ro
      - ./sing-box/config.json.template:/etc/sing-box/config.json.template:ro
      - ./certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
      - VLESS_UUID=${VLESS_UUID}
      - REALITY_PRIVATE_KEY=${REALITY_PRIVATE_KEY}
      - REALITY_SHORT_ID=${REALITY_SHORT_ID}
      - H2_PASSWORD=${H2_PASSWORD}
      - TUIC_UUID=${TUIC_UUID}
      - TUIC_PASSWORD=${TUIC_PASSWORD}
    cap_add:
      - NET_ADMIN
    depends_on:
      - certbot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-net:
    driver: bridge
