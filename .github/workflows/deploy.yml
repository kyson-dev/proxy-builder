name: Deploy to GCP VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
      - "Makefile"
      - "scripts/setup-wif/**"
      - "scripts/setup-firewall.sh"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "beta"

      - name: Deploy
        timeout-minutes: 10
        run: |
          VM="${{ secrets.GCP_VM_NAME }}"
          ZONE="${{ secrets.GCP_VM_ZONE }}"

          # 1. 创建 .env 文件
          echo "📝 创建环境配置..."
          cat > .env << EOF
          PANEL_DOMAIN=${{ secrets.PANEL_DOMAIN }} \
          DATA_ROOT=${{ secrets.DATA_ROOT }} \
          S_UI_DATA_DIR=${{ secrets.S_UI_DATA_DIR }} \
          CADDY_DATA_DIR=${{ secrets.CADDY_DATA_DIR }} \
          EOF

          # 2. 打包
          echo "📦 打包文件..."
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='vars.*.json' \
              --exclude='*.md' \
              --exclude='docs' \
              -czf /tmp/app.tar.gz .

          # 3. 上传
          echo "📤 上传文件..."
          gcloud beta compute scp /tmp/app.tar.gz ${VM}:~/app.tar.gz --zone=${ZONE} --quiet

          # 4. 部署
          echo "🚀 执行部署..."
          gcloud beta compute ssh ${VM} --zone=${ZONE} --quiet --command='
            set -e
            
            # 停止当前服务（如果存在）
            if [ -d ~/app ] && [ -f ~/app/docker-compose.yml ]; then
              echo "⏸️  停止当前服务..."
              cd ~/app
              docker compose down 2>/dev/null || true
            fi
            
            # 备份当前版本
            if [ -d ~/app ]; then
              echo "💾 备份当前版本..."
              rm -rf ~/app.backup
              cp -r ~/app ~/app.backup
            fi
            
            # 解压新版本到 app
            echo "📦 解压新版本..."
            rm -rf ~/app
            mkdir -p ~/app
            tar -xzf ~/app.tar.gz -C ~/app
            rm ~/app.tar.gz
            
            # 部署新版本
            echo "🚀 部署新版本..."
            cd ~/app
            chmod +x deploy.sh
            
            if ./deploy.sh; then
              echo "✅ 部署成功"
              
              # 删除备份
              if [ -d ~/app.backup ]; then
                echo "🧹 清理备份..."
                rm -rf ~/app.backup
              fi
              
              echo "✅ 部署完成"
            else
              echo "❌ 部署失败"
              
              # 从备份恢复
              if [ -d ~/app.backup ]; then
                echo "🔄 从备份恢复..."
                rm -rf ~/app
                mv ~/app.backup ~/app
                
                # 重启旧版本
                cd ~/app
                docker compose up -d 2>/dev/null || echo "⚠️ 旧版本重启失败"
                
                echo "✅ 已恢复到旧版本"
              else
                echo "⚠️ 没有备份可恢复"
              fi
              
              exit 1
            fi
          '

          echo "✅ 部署完成"
