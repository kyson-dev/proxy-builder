name: Deploy to GCP VM

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支自动部署
  push:
    branches:
      - main
    # 排除这些文件的变更（文档、配置模板等不触发部署）
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
      - "Makefile"
      - "scripts/setup-wif/**"
      - "scripts/setup-firewall.sh"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "beta"

      - name: Deploy
        run: |
          VM="${{ secrets.GCP_VM_NAME }}"
          ZONE="${{ secrets.GCP_VM_ZONE }}"

          # 1. 打包文件
          echo "📦 打包文件..."
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='vars.*.json' \
              --exclude='s-ui/db' \
              --exclude='s-ui/cert/*.pem' \
              --exclude='*.md' \
              --exclude='docs' \
              -czf /tmp/app.tar.gz .

          # 2. 上传
          echo "📤 上传文件..."
          gcloud beta compute scp /tmp/app.tar.gz ${VM}:~/ --zone=${ZONE} --quiet

          # 3. 部署
          echo "🚀 执行部署..."
          gcloud beta compute ssh ${VM} --zone=${ZONE} --quiet --command="
            set -e
            mkdir -p ~/app
            tar -xzf ~/app.tar.gz -C ~/app
            rm ~/app.tar.gz
            cd ~/app
            chmod +x deploy.sh
            ./deploy.sh
          "

          echo "✅ 部署完成"
