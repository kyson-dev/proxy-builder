name: Deploy to GCP VM (WIF)

on:
  workflow_dispatch: # Allow manual triggering from any branch

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Select environment based on branch
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure SSH
        run: |
          # 1. Setup SSH keys and update config
          # This command automatically generates keys and updates ~/.ssh/config
          gcloud compute config-ssh --project=${{ secrets.GCP_PROJECT_ID }} --quiet

          # 2. Construct the hostname alias (format: name.zone.project)
          HOST="${{ secrets.GCP_VM_NAME }}.${{ secrets.GCP_VM_ZONE }}.${{ secrets.GCP_PROJECT_ID }}"
          echo "VM_HOST=$HOST" >> $GITHUB_ENV

          # 3. Warm-up connection (Critical for new VMs)
          # First connection triggers key propagation to the VM. We retry until successful.
          echo "🔄 Warming up SSH connection..."
          for i in {1..5}; do
            if gcloud compute ssh ${{ secrets.GCP_VM_NAME }} --zone=${{ secrets.GCP_VM_ZONE }} --command="echo SSH Ready" --quiet; then
              echo "✅ SSH connection established"
              break
            fi
            echo "⏳ Waiting for SSH keys to propagate... ($i/5)"
            sleep 10
          done

      - name: Prepare Remote Directory
        run: |
          # Use gcloud ssh directly for better reliability
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} --zone=${{ secrets.GCP_VM_ZONE }} --command="mkdir -p ~/app" --quiet

          # Get Remote Home (for rsync path)
          REMOTE_HOME=$(gcloud compute ssh ${{ secrets.GCP_VM_NAME }} --zone=${{ secrets.GCP_VM_ZONE }} --command="pwd" --quiet)
          echo "APP_DIR=$REMOTE_HOME/app" >> $GITHUB_ENV

      - name: Sync files to server
        run: |
          # Sync files using the configured SSH alias
          # We use "runner@" fallback protection by strictly using the alias options
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "sing-box/certs" \
            --exclude "*.md" \
            --exclude "docs/" \
            ./ ${{ env.VM_HOST }}:${{ env.APP_DIR }}/

      - name: Create/Update .env file
        run: |
          # Construct the .env file content locally first to handle newlines correctly
          echo "${{ secrets.ENV_FILE }}" > .env.temp

          # Copy .env file using gcloud scp (simpler than cat via ssh)
          gcloud compute scp .env.temp ${{ secrets.GCP_VM_NAME }}:~/app/.env --zone=${{ secrets.GCP_VM_ZONE }} --quiet
          rm .env.temp

      - name: Execute Deployment Script
        run: |
          # Execute the deployment script using gcloud ssh
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} --zone=${{ secrets.GCP_VM_ZONE }} --command="cd ~/app && chmod +x deploy.sh && ./deploy.sh" --quiet
