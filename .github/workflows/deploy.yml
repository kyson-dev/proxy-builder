name: Deploy to GCP VM (Safe Env + Config Check + Zero Downtime)

on:
  push:
    branches: ["main"]

jobs:
  # 部署步骤
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to server (excluding .env)
        run: |
          rsync -avz --delete \
            --exclude ".env" \
            --exclude ".git" \
            --exclude "certs" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/app/

      - name: Create/Update .env file from GitHub Secrets
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            cat > /home/${{ secrets.VM_USER }}/app/.env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF
          "

      - name: Execute Deployment Script
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "
            cd /home/${{ secrets.VM_USER }}/app &&
            chmod +x deploy.sh &&
            ./deploy.sh
          "
