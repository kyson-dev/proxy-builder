name: Deploy to GCP VM

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "beta"

      - name: Deploy
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          VM="${{ secrets.GCP_VM_NAME }}"
          ZONE="${{ secrets.GCP_VM_ZONE }}"

          # 1. 打包文件（排除不需要的内容）
          echo "📦 打包文件..."
          tar --exclude='.env*' \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='sing-box/certs' \
              --exclude='*.md' \
              --exclude='docs' \
              -czf /tmp/app.tar.gz .

          # 2. 创建 .env 文件 (安全写入)
          echo "$ENV_FILE_CONTENT" > /tmp/.env

          # 3. 上传文件到服务器
          echo "📤 上传文件..."
          gcloud beta compute scp /tmp/app.tar.gz /tmp/.env ${VM}:~/ --zone=${ZONE} --quiet

          # 4. 在服务器上解压并部署
          echo "🚀 执行部署..."
          gcloud beta compute ssh ${VM} --zone=${ZONE} --quiet --command="
            set -e
            mkdir -p ~/app
            tar -xzf ~/app.tar.gz -C ~/app
            mv ~/.env ~/app/.env
            rm ~/app.tar.gz
            cd ~/app
            chmod +x deploy.sh
            ./deploy.sh
          "

          echo "✅ 部署完成"
