name: Deploy to GCP VM (WIF)

on:
  workflow_dispatch: # Allow manual triggering from any branch

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Select environment based on branch
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: SSH Warm-up
        run: |
          # Warm-up connection (Critical for new VMs with OS Login)
          # First connection triggers key propagation. We retry until successful.
          echo "🔄 Establishing SSH connection..."
          for i in {1..10}; do
            if gcloud beta compute ssh ${{ secrets.GCP_VM_NAME }} \
              --zone=${{ secrets.GCP_VM_ZONE }} \
              --command="echo '✅ SSH Ready'" \
              --quiet 2>/dev/null; then
              echo "SSH connection established successfully"
              exit 0
            fi
            echo "⏳ Waiting for SSH keys to propagate... ($i/10)"
            sleep 10
          done
          echo "❌ Failed to establish SSH connection after 10 attempts"
          exit 1

      - name: Sync files to server
        run: |
          # Use gcloud scp to copy files (more reliable with WIF than rsync)
          # First create a tarball excluding unwanted files
          tar --exclude='.env' \
              --exclude='.env.*' \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='sing-box/certs' \
              --exclude='*.md' \
              --exclude='docs' \
              -czf /tmp/app.tar.gz .

          # Copy tarball to server
          gcloud beta compute scp /tmp/app.tar.gz \
            ${{ secrets.GCP_VM_NAME }}:~/app.tar.gz \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --quiet

          # Extract on server
          gcloud beta compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --command="mkdir -p ~/app && tar -xzf ~/app.tar.gz -C ~/app && rm ~/app.tar.gz" \
            --quiet

      - name: Create .env file
        run: |
          # Write ENV_FILE to local temp file
          echo '${{ secrets.ENV_FILE }}' > /tmp/.env.temp

          # Copy to server
          gcloud beta compute scp /tmp/.env.temp \
            ${{ secrets.GCP_VM_NAME }}:~/app/.env \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --quiet

      - name: Execute Deployment
        run: |
          gcloud beta compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --command="cd ~/app && chmod +x deploy.sh && ./deploy.sh" \
            --quiet
