name: Deploy to GCP VM

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "beta"

      - name: Deploy
        env:
          VARS_JSON: ${{ secrets.VARS_JSON }}
        run: |
          VM="${{ secrets.GCP_VM_NAME }}"
          ZONE="${{ secrets.GCP_VM_ZONE }}"

          # 1. 打包文件
          echo "📦 打包文件..."
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='vars.*.json' \
              --exclude='sing-box/certs' \
              --exclude='*.md' \
              --exclude='docs' \
              -czf /tmp/app.tar.gz .

          # 2. 创建 vars.json (从 Secret)
          echo "$VARS_JSON" > /tmp/vars.json

          # 3. 上传
          echo "📤 上传文件..."
          gcloud beta compute scp /tmp/app.tar.gz /tmp/vars.json ${VM}:~/ --zone=${ZONE} --quiet

          # 4. 部署
          echo "🚀 执行部署..."
          gcloud beta compute ssh ${VM} --zone=${ZONE} --quiet --command="
            set -e
            mkdir -p ~/app
            tar -xzf ~/app.tar.gz -C ~/app
            mv ~/vars.json ~/app/vars.json
            rm ~/app.tar.gz
            cd ~/app
            chmod +x deploy.sh
            ./deploy.sh
          "

          echo "✅ 部署完成"
