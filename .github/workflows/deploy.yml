name: Deploy to GCP VM

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "beta"

      - name: Deploy
        run: |
          VM="${{ secrets.GCP_VM_NAME }}"
          ZONE="${{ secrets.GCP_VM_ZONE }}"

          # 1. 打包文件（排除不需要的内容）
          echo "� 打包文件..."
          tar --exclude='.env*' \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='sing-box/certs' \
              --exclude='*.md' \
              --exclude='docs' \
              -czf /tmp/app.tar.gz .

          # 2. 创建 .env 文件
          echo '${{ secrets.ENV_FILE }}' > /tmp/.env

          # 3. 上传文件到服务器
          echo "📤 上传文件..."
          gcloud beta compute scp /tmp/app.tar.gz /tmp/.env ${VM}:~/ --zone=${ZONE} --quiet

          # 4. 在服务器上解压并部署
          echo "🚀 执行部署..."
          gcloud beta compute ssh ${VM} --zone=${ZONE} --quiet --command="
            set -e
            mkdir -p ~/app
            tar -xzf ~/app.tar.gz -C ~/app
            mv ~/.env ~/app/.env
            rm ~/app.tar.gz
            cd ~/app
            chmod +x deploy.sh
            ./deploy.sh
          "

          echo "✅ 部署完成"

      - name: Debug - Investigate Native SSH
        if: always() # 无论前面是否成功都运行
        run: |
          echo "🔍 === 开始 SSH 侦探实验 ==="

          echo "1. 尝试生成 SSH 配置"
          gcloud beta compute config-ssh --project=${{ secrets.GCP_PROJECT_ID }} --quiet

          echo ""
          echo "2. 查看 ~/.ssh/config 内容"
          cat ~/.ssh/config || echo "No config file found"

          echo ""
          echo "3. 查看生成的密钥文件"
          ls -la ~/.ssh/

          echo ""
          echo "4. 尝试解析主机名"
          # 提取 Host 别名
          HOST_ALIAS="${{ secrets.GCP_VM_NAME }}.${{ secrets.GCP_VM_ZONE }}.${{ secrets.GCP_PROJECT_ID }}"
          echo "Host Alias: $HOST_ALIAS"

          echo ""
          echo "5. 尝试原生 SSH 连接 (Dry Run)"
          # 使用 -G 选项只打印配置，不实际连接，看看 SSH 到底想用什么配置连
          ssh -G $HOST_ALIAS || true

          echo ""
          echo "6. 尝试真实连接 (带详细日志)"
          # 尝试连接，看看会在哪一步挂掉
          # 注意：这里很可能会失败，这是预期的
          ssh -v -o ConnectTimeout=5 $HOST_ALIAS "echo 'I am Native SSH'" || echo "❌ Native SSH Failed as expected"

          echo "🔍 === 实验结束 ==="
